<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>svgic — Popup</title>
  <link rel="stylesheet" href="./shared.css" />
  <style>
    .header-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .controls-label {
      font-size: 0.72rem;
      color: #555;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .mode-btn {
      font-size: 0.72rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid #333;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover  { border-color: #555; color: #aaa; }
    .mode-btn.active { border-color: #4c8aff; color: #4c8aff; background: rgba(76, 138, 255, 0.08); }
  </style>
</head>
<body>
  <header>
    <h1>svgic</h1>
    <nav class="page-nav">
      <a href="/"             class="nav-link active">Popup</a>
      <a href="/styling.html" class="nav-link">Styling</a>
      <a href="/zoom.html"    class="nav-link">Zoom</a>
      <a href="/debug.html"   class="nav-link">Debug</a>
    </nav>
    <div class="header-controls">
      <span class="controls-label">popup:</span>
      <button class="mode-btn active" data-mode="element">element</button>
      <button class="mode-btn" data-mode="cursor">cursor</button>
      <button class="mode-btn" data-mode="target">target</button>
      <button class="mode-btn" data-mode="template">template</button>
      <button class="mode-btn" data-mode="click">click</button>
      <button class="mode-btn" data-mode="interactive">interactive</button>
      <button class="mode-btn" data-mode="off">off</button>
    </div>
  </header>

  <div class="layout">
    <div id="schema-container"></div>

    <aside class="sidebar">
      <div class="info-panel" id="info-panel">
        <h2>Info <span id="info-panel-mode" style="font-weight:400;text-transform:none;letter-spacing:0;color:#4c8aff;font-size:0.65rem;"></span></h2>
        <p class="info-empty" id="info-hint">Click a room</p>
        <div class="info-card" id="info-card">
          <div class="info-title" id="info-title"></div>
          <div class="info-desc"  id="info-desc"></div>
          <div class="info-fields">
            <div class="info-field">
              <span class="info-field-label">ID</span>
              <span class="info-field-value" id="info-id"></span>
            </div>
            <div class="info-field">
              <span class="info-field-label">Status</span>
              <span class="info-field-value" id="info-status"></span>
            </div>
            <div class="info-field">
              <span class="info-field-label">Capacity</span>
              <span class="info-field-value" id="info-capacity"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="event-log" id="event-log">
        <h2>Events</h2>
      </div>
    </aside>
  </div>

  <!-- popup template for template mode — markup separate from JS -->
  <template id="room-popup-tpl">
    <div class="room-popup">
      <div class="room-popup__title"></div>
      <div class="room-popup__desc"></div>
      <div class="room-popup__status"></div>
    </div>
  </template>

  <style>
    .room-popup {
      background: #1e1e2e;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 8px 12px;
      min-width: 160px;
      pointer-events: none;
      position: fixed;
      z-index: 9999;
      font-size: 13px;
      line-height: 1.4;
    }
    .room-popup__title {
      font-weight: 600;
      color: #e0e0ff;
      margin-bottom: 2px;
    }
    .room-popup__desc {
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .room-popup__status {
      font-size: 11px;
    }
    .room-popup__status.free       { color: #4caf81; }
    .room-popup__status.busy       { color: #e06c75; }
    .room-popup__status.restricted { color: #e5c07b; }

    /* interactive popup */
    .interactive-popup {
      background: #1e1e2e;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 8px 12px;
      min-width: 160px;
      position: fixed;
      z-index: 9999;
      font-size: 13px;
      line-height: 1.4;
    }
    .interactive-popup__title {
      font-weight: 600;
      color: #e0e0ff;
      margin-bottom: 6px;
    }
    .interactive-popup__link {
      display: inline-block;
      font-size: 11px;
      color: #4c8aff;
      text-decoration: none;
      padding: 2px 0;
    }
    .interactive-popup__link:hover { text-decoration: underline; }
  </style>

  <script type="module" src="./main.ts"></script>
</body>
</html>
